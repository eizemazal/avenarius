name: Release

# Tag-driven release. Push a version tag to build, sign, and publish:
#
#     git tag v1.2.3 && git push origin v1.2.3
#
# The tag (minus the leading "v") becomes the app's versionName; the CI run number
# becomes the versionCode (monotonic, required to be higher on each Play upload).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64       - base64 of avenarius-upload.jks  (`base64 -i avenarius-upload.jks | pbcopy`)
#   KEYSTORE_PASSWORD     - the (rotated) keystore password
#   KEY_ALIAS             - "avenarius"
#   KEY_PASSWORD          - the key password
# Optional (enables Google Play upload; otherwise that step is skipped):
#   PLAY_SERVICE_ACCOUNT_JSON - a Play Console service-account JSON with release access

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.2.3) when running manually"
        required: true

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    name: Build, sign & publish
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          # Tag push -> strip the leading "v"; manual run -> use the input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NAME="${{ github.event.inputs.version }}"
          else
            NAME="${GITHUB_REF_NAME#v}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          # versionCode must increase on every Play upload; the run number is monotonic.
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Releasing versionName=$NAME versionCode=${{ github.run_number }}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Fail if signing secrets are missing
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        run: |
          echo "::error::KEYSTORE_BASE64 (and the keystore password secrets) must be set to build a signed release."
          exit 1

      - name: Decode keystore
        id: keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"

      - name: Build signed AAB + APK
        env:
          AVENARIUS_VERSION_NAME: ${{ steps.version.outputs.name }}
          AVENARIUS_VERSION_CODE: ${{ steps.version.outputs.code }}
          AVENARIUS_KEYSTORE: ${{ steps.keystore.outputs.path }}
          AVENARIUS_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          AVENARIUS_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          AVENARIUS_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :composeApp:bundleRelease :composeApp:assembleRelease --no-daemon --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.version.outputs.name) }}
          name: Avenarius ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: |
            composeApp/build/outputs/bundle/release/*.aab
            composeApp/build/outputs/apk/release/*.apk

      - name: Upload to Google Play (internal track)
        if: ${{ env.PLAY_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.avenarius.app
          releaseFiles: composeApp/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
