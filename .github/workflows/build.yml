name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: # lets you trigger a build manually from the Actions tab

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode keystore (optional, for signed release builds)
        id: keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace

      - name: Build release APK (signed)
        if: ${{ steps.keystore.outputs.path != '' }}
        env:
          AVENARIUS_KEYSTORE: ${{ steps.keystore.outputs.path }}
          AVENARIUS_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          AVENARIUS_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          AVENARIUS_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: avenarius-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: ${{ steps.keystore.outputs.path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: avenarius-release-apk
          path: composeApp/build/outputs/apk/release/*.apk
